version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - ./html:/var/www/html/
    depends_on:
      - db
    environment:
      MYSQL_HOST: db
      MYSQL_DATABASE: sistema_agencia
      MYSQL_USER: root
      MYSQL_PASSWORD: password

  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=rootpass  
      - MYSQL_DATABASE=sistema_agencia 
      - MYSQL_USER=agencia_user       
      - MYSQL_PASSWORD=123456         
    volumes:
      - db_data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sistema_agencia
    ports:
      - "3306:3306"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db  # Conecta phpMyAdmin al servicio "db"
      PMA_USER: root
      PMA_PASSWORD: password
    restart: always

volumes:
  db_data: